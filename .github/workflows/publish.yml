# SPDX-License-Identifier: MIT
name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify tag matches pyproject.toml version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(python3 -c "
          import re, sys
          m = re.search(r'^version = \"(.+?)\"', open('pyproject.toml').read(), re.M)
          if not m: sys.exit('version not found in pyproject.toml')
          print(m.group(1))
          ")
          EXPECTED="v${PKG_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "ERROR: release tag '${TAG}' does not match pyproject.toml version '${EXPECTED}'"
            exit 1
          fi

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      - name: Build
        run: |
          pip install build==1.2.2
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
