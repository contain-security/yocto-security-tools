# SPDX-License-Identifier: MIT
name: Bump patch version

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        run: |
          NEW=$(python3 -c "
          import re, sys
          text = open('pyproject.toml').read()
          m = re.search(r'^version = \"(\d+\.\d+\.)(\d+)\"', text, re.M)
          if not m: sys.exit('version not found in pyproject.toml')
          new_ver = m.group(1) + str(int(m.group(2)) + 1)
          open('pyproject.toml', 'w').write(text.replace(m.group(0), f'version = \"{new_ver}\"'))
          print(new_ver)
          ")
          echo "NEW_VERSION=${NEW}" >> "$GITHUB_ENV"
          BRANCH="chore/bump-version-${NEW}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add pyproject.toml
          git commit -s -m "chore: bump version to ${NEW}"
          git push -u origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/labels \
            -f name="automated" -f description="Automated PRs" -f color="ededed" \
            2>/dev/null || true
          gh pr create \
            --title "chore: bump version to ${{ env.NEW_VERSION }}" \
            --body "Automated patch version bump to ${{ env.NEW_VERSION }} after release ${{ github.event.release.tag_name }}." \
            --base main \
            --label "automated"
          gh pr merge --auto --squash
